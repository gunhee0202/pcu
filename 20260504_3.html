<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>방문 시간이 오전 오후에 따라 배경색 변경</title>
</head>
<body>

    <h2>오전이면 lightskyblue, 오후이면 orange 배경</h2>
    <hr>

    <script>
        let now = new Date();
        let hour = now.getHours();

        // 오전/오후에 따라 배경색 변경
        if(hour < 12) {
            document.body.style.backgroundColor = "lightskyblue";
        } else {
            document.body.style.backgroundColor = "orange";
        }

        // 현재 시간 출력
        document.write(
            "<h3>현재 시간 : "
            + hour + "시,"
            + now.getMinutes() + "분,"
            + now.getSeconds() + "초</h3>"
        );
    </script>

</body>
</html>
