<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>정수 5개 입력받아 역순으로 출력</title>
</head>
<body>
    <h2>정수 5개 입력받아 역순으로 출력</h2>
    <hr>
    <script>
        let arr = [];
        for(let i = 0; i < 5; i++) {
            let num = prompt((i + 1) + "번째 정수 입력");
            arr.push(parseInt(num));
        }
        document.write("<h3>입력된 수의 배열</h3>");
        document.write(arr.join(" "));
        arr.reverse();
        document.write("<h3>역순으로 재정렬된 배열</h3>");
        document.write(arr.join(" "));
    </script>
</body>
</html>
